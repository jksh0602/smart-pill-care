name: smart_pill_care
description: 스마트 복약 관리 앱

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Windows 호환 버전
  firebase_core: 2.13.0
  firebase_auth: 4.6.0
  cloud_firestore: 4.7.0
  firebase_messaging: 14.5.0

  # 상태관리
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_local_notifications: ^21.0.0

  # 유틸
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/